<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corte Maestro - Premium Barber</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --cream: #f4eade; --glass: rgba(0, 0, 0, 0.85); --border: rgba(244, 234, 222, 0.12); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: var(--cream); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HERO SECCIÓN - ADAPTADA A MÓVIL */
        .hero {
            height: 100vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('fondo-barberia.jpg') no-repeat center center;
            background-size: cover; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        .logo-main {
            font-family: 'UnifrakturMaguntia', serif; font-size: clamp(50px, 15vw, 100px); 
            line-height: 0.8; color: white; margin-bottom: 10px;
        }
        .logo-main span { display: block; font-size: clamp(25px, 6vw, 45px); font-weight: 400; }

        .hero-subtitle { font-size: clamp(12px, 3vw, 16px); opacity: 0.8; margin-bottom: 40px; }

        /* TARJETAS DE SERVICIOS - GRID RESPONSIVO */
        .services { padding: 60px 20px; background: #050505; text-align: center; }
        .services-header { 
            font-size: 28px; letter-spacing: 5px; text-transform: uppercase; 
            margin-bottom: 50px; border-bottom: 2px solid var(--cream); display: inline-block; padding-bottom: 10px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px; max-width: 1200px; margin: 0 auto;
        }

        .service-card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 10px;
            padding: 30px; text-align: left; transition: 0.3s;
        }

        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .card-title { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: white; }

        .price-item {
            display: flex; justify-content: space-between; padding: 15px 0;
            border-bottom: 1px solid rgba(244, 234, 222, 0.05); cursor: pointer;
            transition: 0.2s; font-size: 14px;
        }
        .price-item:hover { color: white; background: rgba(255,255,255,0.05); padding-left: 5px; }
        .price-value { font-weight: 600; color: #fff; }

        /* WHATSAPP FLOTANTE */
        .btn-whatsapp {
            position: fixed; bottom: 30px; right: 30px; background: #25d366;
            color: white; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100;
            text-decoration: none;
        }

        /* AJUSTES ESPECÍFICOS PARA TELÉFONOS MUY PEQUEÑOS */
        @media (max-width: 480px) {
            .services-grid { grid-template-columns: 1fr; }
            .service-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="logo-main">Corte Maestro<span>Barbería</span></div>
        <p class="hero-subtitle">Desde 2010 • Cuidado Personal Masculino Premium</p>
    </section>

    <section class="services">
        <h2 class="services-header">Nuestros Servicios</h2>
        <div class="services-grid">
            
            <div class="service-card">
                <div class="card-header"><i class="fas fa-cut"></i> <h3 class="card-title">Cortes</h3></div>
                <div class="price-item" onclick="reservar('Corte Clásico', '$6')">
                    <span>Corte Clásico</span> <span class="price-value">$6</span>
                </div>
                <div class="price-item" onclick="reservar('Corte con Máquina', '$8')">
                    <span>Corte con Máquina</span> <span class="price-value">$8</span>
                </div>
            </div>

            <div class="service-card">
                <div class="card-header"><i class="fas fa-user-tie"></i> <h3 class="card-title">Barba</h3></div>
                <div class="price-item" onclick="reservar('Recorte de Barba', '$6')">
                    <span>Recorte de Barba</span> <span class="price-value">$6</span>
                </div>
                <div class="price-item" onclick="reservar('Modelado Premium', '$10')">
                    <span>Modelado Premium</span> <span class="price-value">$10</span>
                </div>
            </div>

        </div>
    </section>

    <a href="https://wa.me/584120361856" class="btn-whatsapp" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        function reservar(servicio, precio) {
            const num = "584120361856"; // CAMBIA ESTO
            const msj = `Hola! Quiero agendar: *${servicio}* (${precio})`;
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msj)}`, '_blank');
        }
    </script>
</body>
</html>
